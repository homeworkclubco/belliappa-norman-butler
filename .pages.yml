media:
  input: src/assets/uploads
  # Relative to src/content/pages/ — Astro resolves this for image optimisation
  output: ../../assets/uploads

components:
  image_with_alt:
    type: object
    fields:
      - { name: src, label: Image, type: image }
      - { name: alt, label: Alt text, type: string }
  seo:
    type: object
    label: SEO & social sharing
    fields:
      - name: title
        label: "SEO title"
        description: "Recommended under 60 characters"
        type: string
      - name: description
        label: "Meta description"
        description: "Recommended 150-160 characters"
        type: text
      - name: image
        label: "Social share image"
        description: "recommended: 1200×630px"
        type: image
  sections: 
    label: Page sections
    type: block
    list: 
      collapsible:
        collapsed: true
        summary: "{type}"
    blockKey: type
    blocks:
      - name: homepageBlock
        label: Homepage
        fields: []
      - name: imageHeroBlock
        label: Image Hero
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
          - { name: image, label: Image, type: image, required: true }
          - { name: imageAlt, label: Image alt text, type: string }
          - { name: minHeight, label: Min height (e.g. 28rem), type: string }
          - name: colorScheme
            label: Colour scheme
            type: select
            options:
              values: ["light", "dark"]
      - name: headingBlock
        label: Heading Block
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
          - { name: id, label: Anchor ID, type: string }
          - name: pt
            label: Padding top
            type: select
            options:
              values: ["none", "sm", "md", "lg", "xl", "2xl"]
          - name: pb
            label: Padding bottom
            type: select
            options:
              values: ["none", "sm", "md", "lg", "xl", "2xl"]
      - name: videoHeroBlock
        label: Video Hero
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: src, label: YouTube URL, type: string, required: true }
          - { name: poster, label: Poster image, type: image }
      - name: contactBlock
        label: Contact
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
      - name: leadBlock
        label: Lead Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
      - name: textBlock
        label: Text Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
      - name: clientLogosBlock
        label: Client Logos
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
      - name: serviceCardsBlock
        label: Service Cards
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
      - name: caseStudyGridBlock
        label: Case Study Grid
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
          - name: order
            label: Case studies (drag to reorder; unselected appear after, alphabetically)
            type: reference
            list: true
            options:
              collection: case_studies
              value: "{fields.uuid}"
              search: title
              label: "{fields.title}"
      - name: galleryBlock
        label: Gallery
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - name: images
            label: Images
            component: image_with_alt
            list: true
      - name: mediaTextBlock
        label: Media + Text
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
          - name: image
            label: Image
            component: image_with_alt
          - name: mediaSide
            label: Media side
            type: select
            options:
              values: ["left", "right"]
          - name: padding
            label: Padding
            type: select
            options:
              values: ["none", "sm", "md", "lg", "xl", "2xl"]
          - name: fixedRatio
            label: Image ratio (e.g. 4/3, 16/9)
            type: string
          - name: cta
            label: CTA
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: URL, type: string }
      - name: tileGridBlock
        label: Tile Grid
        fields:
          - { name: id, label: Anchor ID, type: string }
          - name: columns
            label: Columns
            type: select
            options:
              values: ["2", "3"]
          - name: items
            label: Tiles
            type: object
            list: true
            fields:
              - { name: title, label: Title, type: string }
              - { name: image, label: Image, type: image }
              - { name: imageAlt, label: Image alt text, type: string }
              - { name: href, label: Link URL, type: string }
              - { name: cta, label: CTA label, type: string }
      - name: textGridBlock
        label: Text Grid
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: subtitle, label: Subtitle, type: string }
          - name: items
            label: Items
            type: object
            list: true
            fields:
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: rich-text }
      - name: mediaBlock
        label: Media
        fields:
          - { name: id, label: Anchor ID, type: string }
          - name: mediaType
            label: Media type
            type: select
            options:
              values: ["image", "video"]
          - { name: image, label: Image, type: image }
          - { name: imageAlt, label: Image alt text, type: string }
          - { name: youtubeUrl, label: YouTube URL, type: string }
          - { name: caption, label: Caption, type: string }
          - name: width
            label: Width
            type: select
            options:
              values: ["full", "wide", "default", "narrow"]
          - name: padding
            label: Padding
            type: select
            options:
              values: ["none", "sm", "md", "lg", "xl", "2xl"]
      - name: stickyHeadingBlock
        label: Sticky Heading Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
      - name: enquiriesBlock
        label: Enquiries (centered monogram + wordmark)
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Bottom wordmark (e.g. ENQUIRIES), type: string }
          - name: lines
            label: Centered contact lines
            type: object
            list: true
            fields:
              - { name: text, label: Text, type: string }
              - { name: href, label: Link URL (optional — e.g. mailto:info@bnb.art), type: string }

content:
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
    fields:
      - { name: uuid, label: UUID, type: uuid, options: {editable: false, generate: false} }
      - { name: title, label: Title (Internal reference), type: string }
      - { name: description, label: Description, type: text }
      - { name: slug, label: URL slug (e.g. about or services/events), type: string }
      - { name: hideHeaderTrigger, label: Hide header menu trigger, description: "For pages that provide their own menu trigger (e.g. the centered monogram on Enquiries).", type: boolean, default: false }
      - name: seo
        component: seo
      - name: sections
        component: sections

  - name: redirects
    label: Redirects
    type: file
    list: true
    path: src/content/redirects.json
    format: json
    fields:
      - { name: from, label: "From (e.g. /old-path)", type: string, required: true }
      - { name: to, label: "To (e.g. /new-path or https://example.com)", type: string, required: true }
      - name: status
        label: Status code
        type: select
        required: true
        default: "301"
        options:
          values:
            - { value: "301", label: "301 Permanent" }
            - { value: "302", label: "302 Temporary" }