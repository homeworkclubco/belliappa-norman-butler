media:
  input: src/assets/uploads
  # Relative to src/content/pages/ — Astro resolves this for image optimisation
  output: ../../assets/uploads

components:
  image_with_alt:
    type: object
    fields:
      - { name: src, label: Image, type: image }
      - { name: alt, label: Alt text, type: string }
  seo:
    type: object
    label: SEO & social sharing
    fields:
      - name: title
        label: "SEO title"
        description: "Recommended under 60 characters"
        type: string
      - name: description
        label: "Meta description"
        description: "Recommended 150-160 characters"
        type: text
      - name: image
        label: "Social share image"
        description: "recommended: 1200×630px"
        type: image
  sections:
    label: Page sections
    type: block
    list:
      collapsible:
        collapsed: true
        summary: "{type}"
    blockKey: type
    blocks:
      - name: homepageBlock
        label: Homepage
        fields: []
      - name: textBlock
        label: Text Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
      - name: stickyHeadingBlock
        label: Sticky Heading Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text }
      - name: enquiriesBlock
        label: Enquiries (centered monogram + wordmark)
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Bottom wordmark (e.g. ENQUIRIES), type: string }
          - name: lines
            label: Centered contact lines
            type: object
            list: true
            fields:
              - { name: text, label: Text, type: string }
              - { name: href, label: Link URL (optional — e.g. mailto:info@bnb.art), type: string }
      - name: peopleBlock
        label: People
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Fixed bottom-left heading (e.g. PEOPLE), type: string }
          - name: people
            label: People
            type: object
            list: true
            fields:
              - { name: name, label: Name, type: string, required: true }
              - name: image
                label: Image (3:4)
                component: image_with_alt
              - { name: bio, label: Bio, type: rich-text }

content:
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
    fields:
      - { name: uuid, label: UUID, type: uuid, options: {editable: false, generate: false} }
      - { name: title, label: Title (Internal reference), type: string }
      - { name: description, label: Description, type: text }
      - { name: slug, label: URL slug (e.g. about or services/events), type: string }
      - { name: hideHeaderTrigger, label: Hide header menu trigger, description: "For pages that provide their own menu trigger (e.g. the centered monogram on Enquiries).", type: boolean, default: false }
      - name: seo
        component: seo
      - name: sections
        component: sections

  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings.json
    format: json
    fields:
      - name: organization
        label: Organisation
        type: object
        fields:
          - { name: legalName, label: Legal name, type: string }


  - name: redirects
    label: Redirects
    type: file
    list: true
    path: src/content/redirects.json
    format: json
    fields:
      - { name: from, label: "From (e.g. /old-path)", type: string, required: true }
      - { name: to, label: "To (e.g. /new-path or https://example.com)", type: string, required: true }
      - name: status
        label: Status code
        type: select
        required: true
        default: "301"
        options:
          values:
            - { value: "301", label: "301 Permanent" }
            - { value: "302", label: "302 Temporary" }
