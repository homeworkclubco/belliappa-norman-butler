media:
  input: src/assets/uploads
  # Relative to src/content/pages/ — Astro resolves this for image optimisation
  output: ../../assets/uploads

components:
  image_with_alt:
    type: object
    fields:
      - { name: src, label: Image, type: image }
      - { name: alt, label: Alt text, type: string }
  seo:
    type: object
    label: SEO & social sharing
    fields:
      - name: title
        label: "SEO title"
        description: "Recommended under 60 characters"
        type: string
      - name: description
        label: "Meta description"
        description: "Recommended 150-160 characters"
        type: text
      - name: image
        label: "Social share image"
        description: "recommended: 1200×630px"
        type: image
  sections:
    label: Page sections
    type: block
    list:
      collapsible:
        collapsed: true
        summary: "{type}"
    blockKey: type
    blocks:
      - name: homepageBlock
        label: Homepage
        fields: []
      - name: textBlock
        label: Text Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text, options: { format: html } }
      - name: stickyHeadingBlock
        label: Sticky Heading Block
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: rich-text, options: { format: html } }
      - name: enquiriesBlock
        label: Enquiries (centered monogram + wordmark)
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Bottom wordmark (e.g. ENQUIRIES), type: string }
          - name: lines
            label: Centered contact lines
            type: object
            list: true
            fields:
              - { name: text, label: Text, type: string }
              - { name: href, label: Link URL (optional — e.g. mailto:info@bnb.art), type: string }
      - name: peopleBlock
        label: People
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Fixed bottom-left heading (e.g. PEOPLE), type: string }
          - name: people
            label: People
            type: object
            list: true
            fields:
              - { name: name, label: Name, type: string, required: true }
              - name: image
                label: Image (3:4)
                component: image_with_alt
              - { name: bio, label: Bio, type: rich-text, options: { format: html } }
      - name: pressBlock
        label: Press (grid of press items)
        fields:
          - { name: id, label: Anchor ID, type: string }
          - { name: heading, label: Heading (optional), type: string }

content:
  - name: press
    label: Press
    type: collection
    path: src/content/press
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      primary: title
      fields: [image, title, source, date]
      sort: [date, title, source]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: source, label: Source (e.g. The Times), type: string, required: true }
      - { name: date, label: Date, type: date, required: true }
      - name: image
        label: Image
        component: image_with_alt
      - { name: description, label: Short description, type: text }
      - { name: link, label: Link to external press, type: string, required: true }

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
    fields:
      - { name: uuid, label: UUID, type: uuid, options: {editable: false, generate: false} }
      - { name: title, label: Title (Internal reference), type: string }
      - { name: description, label: Description, type: text }
      - { name: slug, label: URL slug (e.g. about or services/events), type: string }
      - { name: hideHeaderTrigger, label: Hide header menu trigger, description: "For pages that provide their own menu trigger (e.g. the centered monogram on Enquiries).", type: boolean, default: false }
      - name: seo
        component: seo
      - name: sections
        component: sections

  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings.json
    format: json
    media:
      input: src/assets/uploads
      output: ../assets/uploads
    fields:
      - name: navLinks
        label: Header navigation links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: href, label: URL (e.g. /work or https://example.com), type: string, required: true }
      - name: organization
        label: Organisation
        type: object
        fields:
          - { name: legalName, label: Legal name, type: string }
          - { name: description, label: Description (used in JSON-LD & shareable AI summaries), type: text }
          - { name: foundingDate, label: Founding date (YYYY or YYYY-MM-DD), type: string }
          - { name: logo, label: Logo (square, for Google Knowledge Panel), type: image }
          - { name: email, label: Contact email, type: string }
          - { name: telephone, label: Phone, type: string }
          - name: sameAs
            label: Social / profile URLs (Instagram, LinkedIn, press, etc.)
            type: string
            list: true
      - name: service
        label: Service
        type: object
        fields:
          - { name: serviceType, label: Service type, type: string, default: "Art Advisory" }
          - { name: areaServed, label: Area served, type: string, default: "Worldwide" }
          - name: knowsAbout
            label: Topics / specialisms
            type: string
            list: true


  - name: redirects
    label: Redirects
    type: file
    list: true
    path: src/content/redirects.json
    format: json
    fields:
      - { name: from, label: "From (e.g. /old-path)", type: string, required: true }
      - { name: to, label: "To (e.g. /new-path or https://example.com)", type: string, required: true }
      - name: status
        label: Status code
        type: select
        required: true
        default: "301"
        options:
          values:
            - { value: "301", label: "301 Permanent" }
            - { value: "302", label: "302 Temporary" }
